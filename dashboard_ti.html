<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OMPI — Dashboard Técnico</title>
  <style>
    :root{ --bg:#071023; --panel:#08182a; --muted:#9aa4b2; --accent:#2e7be6; --ok:#2aa56a }
    html,body{height:100%;margin:0;font-family:Inter,Segoe UI,system-ui,Arial;background:linear-gradient(180deg,#03121a,#071422);color:#e6eef8}
    .user-wrap{max-width:1100px;margin:28px auto;padding:16px}
    .user-header{display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;gap:12px;align-items:center}
    .controls{display:flex;gap:8px}
    .btn{background:var(--accent);color:#fff;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;font-weight: 600;}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06)}

    .kanban-area{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:16px}
    .kanban-column{background:linear-gradient(180deg,#071722,#061422);padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.03)}
    .kanban-column h3{margin:0 0 8px 0}
    .kanban-list{min-height:120px}
    .kanban-card{background:#071a2b;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);cursor:grab}
    .kanban-card.dragging{opacity:0.6}
    .kanban-card .meta{font-size:12px;color:var(--muted);margin-top:8px}
    .timestamps{font-size:11px;color:var(--muted);margin-top:6px}

    .modal{position:fixed;left:0;top:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,0.8);z-index: 100;}
    .modal.hidden{display:none}
    .modal-panel{background:linear-gradient(180deg,#071428,#08182a);padding:24px;border-radius:10px;min-width:400px;color:#dfe9f8;border:1px solid rgba(255,255,255,0.1);box-shadow: 0 10px 25px rgba(0,0,0,0.5)}
    
    /* Ajustes solicitados nos campos de seleção/entrada */
    #addForm label { display: block; margin-top: 12px; font-size: 14px; color: #9fb2d9; }
    
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box; /* Garante que o padding não quebre a largura */
      
      /* Cores solicitadas */
      background-color: #ffffff !important; 
      color: #000000 !important;
      font-weight: 500;
    }

    textarea { resize: vertical; }
    .hidden { display: none; }

  </style>
  </head>
  <body>
  <!-- header removido conforme solicitação (navegação superior ocultada) -->
  <main class="user-wrap">
    <header class="user-header">
      <div class="brand">
        <img src="Logo.svg" alt="Logo OMPI" style="width: 40px; height: 40px; border-radius: 16px;">
        <div>
          <h1 id="loginTitle" style="margin:0">OMPI</h1>
          <p style="margin:0;color:#9fb2d9">Dashboard Técnico</p>
        </div>
      </div>

      <div class="controls">
        <button id="openAddBtn" class="btn">Adicionar chamado</button>
        <button id="resetBtn" class="btn ghost">Resetar Sistema</button>
      </div>
    </header>

    <section class="kanban-area">
      <div class="kanban-column" data-status="todo">
        <h3>Pendente</h3>
        <div class="kanban-list" data-status="todo"></div>
      </div>

      <div class="kanban-column" data-status="doing">
        <h3>Em Andamento</h3>
        <div class="kanban-list" data-status="doing"></div>
      </div>

      <div class="kanban-column" data-status="done">
        <h3>Concluído</h3>
        <div class="kanban-list" data-status="done"></div>
      </div>
    </section>

    <div id="addModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="addTitle">
      <div class="modal-panel">
        <h2 id="addTitle" style="margin-top:0">Novo Chamado</h2>
        <form id="addForm">
          <label>Solicitante
            <input id="author" type="text" placeholder="Seu nome" required />
          </label>

          <label>Setor
            <select id="setor">
              <option value="">-- Escolha --</option>
              <option value="Producao A">Produção A</option>
              <option value="Producao B">Produção B</option>
              <option value="ADM">ADM</option>
              <option value="Almoxarifado">Almoxarifado</option>
            </select>
          </label>

          <label>Tipo de problema
            <select id="issueType" required>
              <option value="">-- Escolha --</option>
              <option value="mouse">Mouse</option>
              <option value="senha">Senha</option>
              <option value="impressora">Impressora</option>
              <option value="rede">Rede</option>
              <option value="outro">Outro</option>
            </select>
          </label>

          <label id="otherLabel" class="hidden">Descreva (Outro)
            <input id="otherText" placeholder="Descreva o problema" />
          </label>

          <label>Prioridade
            <select id="priority">
              <option value="normal">Normal</option>
              <option value="alta">Alta</option>
              <option value="baixa">Baixa</option>
            </select>
          </label>

          <label>Descrição
            <textarea id="description" rows="3" placeholder="Informações adicionais (opcional)"></textarea>
          </label>

          <div class="modal-actions" style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px">
            <button type="button" id="cancelAdd" class="btn ghost">Cancelar</button>
            <button type="submit" class="btn">Criar chamado</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    (function(){
      const STORAGE_KEY = 'ompi_chamados_db';
      const lists = document.querySelectorAll('.kanban-list');
      const openBtn = document.getElementById('openAddBtn');
      const modal = document.getElementById('addModal');
      const cancelBtn = document.getElementById('cancelAdd');
      const addForm = document.getElementById('addForm');
      const resetBtn = document.getElementById('resetBtn');

      function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
      function load(){ try{ const raw = localStorage.getItem(STORAGE_KEY); return raw? JSON.parse(raw): []; }catch(e){ return []; } }
      function save(arr){ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

      let data = load();

      if(openBtn) openBtn.addEventListener('click', ()=> modal && modal.classList.remove('hidden'));
      if(cancelBtn) cancelBtn.addEventListener('click', ()=> modal && modal.classList.add('hidden'));

      if(addForm) addForm.addEventListener('submit', (e)=>{
        e.preventDefault();
        const authorEl = document.getElementById('author');
        const solicitante = authorEl ? authorEl.value.trim() : '';
        const setorEl = document.getElementById('setor');
        const setor = setorEl ? (setorEl.value || 'ADM') : 'ADM';
        const issueEl = document.getElementById('issueType');
        const tipo = issueEl ? issueEl.value : '';
        const descEl = document.getElementById('description');
        const descricao = descEl ? descEl.value.trim() : '';
        const prioEl = document.getElementById('priority');
        const prioridade = prioEl ? (prioEl.value || 'normal') : 'normal';
        if(!solicitante || !tipo) return alert('Preencha solicitante e tipo.');
        
        const item = { 
          id: uid(), 
          solicitante: solicitante, 
          setor: setor, 
          categoria: tipo.charAt(0).toUpperCase()+tipo.slice(1), 
          descricao: descricao, 
          prioridade: prioridade, 
          status: 'todo', 
          data_abertura: new Date().toISOString(), 
          data_inicio: null, 
          data_conclusao: null 
        };
        
        data.unshift(item); 
        save(data); 
        render(); 
        addForm.reset(); 
        modal.classList.add('hidden');
      });

      function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]); }

      function createCard(item){
        const el = document.createElement('div'); 
        el.className='kanban-card'; 
        el.draggable=true; 
        el.dataset.id = item.id;
        
        const prioStyle = item.prioridade === 'alta' ? 'color:#ff6b6b' : (item.prioridade === 'baixa' ? 'color:#74c0fc' : 'color:#9aa4b2');
        
        el.innerHTML = `
          <strong>${escapeHtml(item.categoria)}</strong>
          <span style="font-size:10px; float:right; ${prioStyle}">${item.prioridade.toUpperCase()}</span>
          <div style="margin-top:6px; font-size:13px">${escapeHtml(item.descricao)}</div>
          <div class="meta">${escapeHtml(item.solicitante)} • ${escapeHtml(item.setor)}</div>
          <div class="timestamps">
            <small>Abertura: ${new Date(item.data_abertura).toLocaleString()}</small><br/>
            <small>Início: ${item.data_inicio ? new Date(item.data_inicio).toLocaleString() : '-'}</small><br/>
            <small>Conclusão: ${item.data_conclusao ? new Date(item.data_conclusao).toLocaleString() : '-'}</small>
          </div>`;
        return el;
      }

      function render(){ 
        lists.forEach(l=> l.innerHTML=''); 
        data.forEach(item=>{
          let target = item.status === 'doing' ? 'doing' : (item.status === 'done' ? 'done' : 'todo');
          const container = document.querySelector(`.kanban-list[data-status="${target}"]`);
          if(container) container.appendChild(createCard(item));
        }); 
        attachHandlers(); 
      }

      let dragged=null;
      function attachHandlers(){
        document.querySelectorAll('.kanban-card').forEach(card=>{
          card.addEventListener('dragstart', onDragStart); 
          card.addEventListener('dragend', onDragEnd);
        });
        lists.forEach(list=>{ 
          list.addEventListener('dragover', onDragOver); 
          list.addEventListener('drop', onDrop); 
        });
      }
      
      function onDragStart(e){ dragged=this; this.classList.add('dragging'); e.dataTransfer.setData('text/plain', this.dataset.id); }
      function onDragEnd(){ this.classList.remove('dragging'); dragged=null; }
      function onDragOver(e){ e.preventDefault(); }
      
      function onDrop(e){ 
        e.preventDefault(); 
        const id = e.dataTransfer.getData('text/plain'); 
        const it = data.find(d=>d.id===id); 
        if(!it) return; 
        
        const newStatus = this.dataset.status;
        it.status = newStatus;
        
        if(newStatus === 'doing' && !it.data_inicio) it.data_inicio = new Date().toISOString();
        if(newStatus === 'done' && !it.data_conclusao) it.data_conclusao = new Date().toISOString();
        
        save(data); 
        render(); 
      }

      if(resetBtn) resetBtn.addEventListener('click', ()=>{ 
        if(!confirm('Remover todos os chamados?')) return; 
        localStorage.removeItem(STORAGE_KEY); 
        data = []; 
        render(); 
      });

      setInterval(()=>{ 
        const newData = load();
        if(JSON.stringify(newData) !== JSON.stringify(data)){ data = newData; render(); } 
      }, 5000);

      render();
    
      // CSV export for dashboard
      function toCsv(items){
        if(!items || !items.length) return '';
        const keys = ['id','solicitante','setor','categoria','descricao','prioridade','status','data_abertura','data_inicio','data_conclusao'];
        const header = keys.join(',');
        const lines = items.map(it => keys.map(k => '"'+(String(it[k]||'')).replace(/"/g,'""')+'"').join(','));
        return [header].concat(lines).join('\n');
      }

      const exportBtn = document.getElementById('exportCsvBtn');
      if(exportBtn){
        exportBtn.addEventListener('click', ()=>{
          const arr = load();
          if(!arr || !arr.length) return alert('Nenhum chamado para exportar.');
          const csv = toCsv(arr);
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'ompi_chamados_export.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        });
      }
    })();
  </script>
</body>
</html>
